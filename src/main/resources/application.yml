spring:
  application:
    name: rag-platform

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ragplatform}
    username: ${DATABASE_USERNAME:ragplatform}
    password: ${DATABASE_PASSWORD:ragplatform}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 21MB

  # Virtual threads (Java 21) — melhora throughput em I/O bound (chamadas de IA, banco)
  threads:
    virtual:
      enabled: true

  # ProblemDetail (RFC 9457) habilitado para todos os endpoints Spring MVC
  mvc:
    problemdetails:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    jwt:
      # Base64 de pelo menos 32 bytes para HS256. Em prod defina JWT_SECRET.
      secret: ${JWT_SECRET:cmFncGxhdGZvcm0tZGV2LXNlY3JldC1tdXN0LWJlLTMyLWJ5dGVz}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24h
  storage:
    local-path: ${STORAGE_LOCAL_PATH:./uploads}

logging:
  level:
    dev.ragplatform: INFO
    org.flywaydb: INFO
