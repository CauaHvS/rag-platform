apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-platform.app.serviceName" . }}
  labels:
    {{- include "rag-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    {{- include "rag-platform.app.selectorLabels" . | nindent 4 }}
