apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rag-platform.fullname" . }}-config
  labels:
    {{- include "rag-platform.labels" . | nindent 4 }}
data:
  # ── Configuração do backend ──────────────────────────────────────────────
  DATABASE_URL: "jdbc:postgresql://{{ include "rag-platform.postgres.serviceName" . }}:5432/{{ .Values.postgres.database }}"
  DATABASE_USERNAME: {{ .Values.postgres.username | quote }}
  REDIS_HOST: {{ include "rag-platform.redis.serviceName" . | quote }}
  REDIS_PORT: "6379"
  STORAGE_LOCAL_PATH: {{ .Values.app.storage | default (dict "path" "/app/uploads") | dig "path" "/app/uploads" | quote }}
  CHAT_PROVIDER: {{ .Values.ai.chatProvider | quote }}
  EMBEDDING_PROVIDER: {{ .Values.ai.embeddingProvider | quote }}
  OLLAMA_BASE_URL: {{ .Values.ai.ollamaBaseUrl | quote }}
  {{- if .Values.zipkin.endpoint }}
  ZIPKIN_ENDPOINT: {{ .Values.zipkin.endpoint | quote }}
  {{- end }}

  # ── nginx.conf — injetado no container do frontend ───────────────────────
  # Substitui o nginx.conf da imagem para apontar para o serviço correto do K8s
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://{{ include "rag-platform.app.serviceName" . }}:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering            off;
            proxy_cache                off;
            proxy_read_timeout         120s;
            chunked_transfer_encoding  on;
        }

        location /auth/ {
            proxy_pass http://{{ include "rag-platform.app.serviceName" . }}:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /actuator/ {
            proxy_pass http://{{ include "rag-platform.app.serviceName" . }}:8080;
            proxy_set_header Host $host;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
