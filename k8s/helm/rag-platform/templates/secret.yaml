{{- if or .Values.secrets.jwtSecret .Values.secrets.postgresPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rag-platform.fullname" . }}-secrets
  labels:
    {{- include "rag-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  # JWT_SECRET: gere com `openssl rand -base64 32`
  jwt-secret: {{ required "secrets.jwtSecret é obrigatório" .Values.secrets.jwtSecret | quote }}
  # Senha do PostgreSQL
  postgres-password: {{ required "secrets.postgresPassword é obrigatório" .Values.secrets.postgresPassword | quote }}
  {{- if .Values.secrets.groqApiKey }}
  groq-api-key: {{ .Values.secrets.groqApiKey | quote }}
  {{- end }}
{{- end }}
