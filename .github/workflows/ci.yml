name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend — Build & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build e testes de integração
        # mvn verify roda: compile → test (unit) → package → failsafe (ITs com Testcontainers)
        run: |
          chmod +x mvnw
          ./mvnw verify -q

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instala dependências
        run: npm ci

      - name: Build de produção
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit

  helm:
    name: Helm — Lint do chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Helm setup
        uses: azure/setup-helm@v4

      - name: Adiciona repositório Bitnami
        run: helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update

      - name: Baixa dependências do chart (bitnami/redis)
        run: helm dependency build k8s/helm/rag-platform

      - name: Lint (dev)
        run: |
          helm lint k8s/helm/rag-platform \
            -f k8s/helm/rag-platform/values-dev.yaml \
            --set secrets.jwtSecret=dGVzdA== \
            --set secrets.postgresPassword=test

      - name: Lint (prod)
        run: |
          helm lint k8s/helm/rag-platform \
            -f k8s/helm/rag-platform/values-prod.yaml \
            --set secrets.jwtSecret=dGVzdA== \
            --set secrets.postgresPassword=test \
            --set secrets.groqApiKey=test

      - name: Template dry-run (prod)
        run: |
          helm template rag k8s/helm/rag-platform \
            -f k8s/helm/rag-platform/values-prod.yaml \
            --set secrets.jwtSecret=dGVzdA== \
            --set secrets.postgresPassword=test \
            --set secrets.groqApiKey=test \
            > /dev/null
