apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-platform.fullname" . }}-frontend
  labels:
    {{- include "rag-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    {{- include "rag-platform.frontend.selectorLabels" . | nindent 4 }}
