spring:
  application:
    name: rag-platform

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ragplatform}
    username: ${DATABASE_USERNAME:ragplatform}
    password: ${DATABASE_PASSWORD:ragplatform}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Virtual threads (Java 21) — melhora throughput em I/O bound (chamadas de IA, banco)
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    dev.ragplatform: INFO
    org.flywaydb: INFO
